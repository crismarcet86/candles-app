<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <img *ngIf="logoUrl" [src]="logoUrl" class="login-logo-img" alt="Logo">
      <span *ngIf="!logoUrl">🕯️</span>
    </div>
    <h1 class="auth-title">{{ businessName }}</h1>
    <p class="auth-subtitle">Ingresa a tu cuenta</p>

    <div class="alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" formControlName="email"
               placeholder="correo@ejemplo.com"
               [class.invalid]="field('email')?.invalid && field('email')?.touched">
        <span class="field-error"
              *ngIf="field('email')?.hasError('required') && field('email')?.touched">
          El correo es requerido
        </span>
        <span class="field-error"
              *ngIf="field('email')?.hasError('pattern') && field('email')?.touched">
          Ingresa un correo válido (ej: usuario@dominio.com)
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-icon-wrapper">
          <input id="password"
                 [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="••••••••"
                 [class.invalid]="field('password')?.invalid && field('password')?.touched">
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error"
              *ngIf="field('password')?.invalid && field('password')?.touched">
          La contraseña es requerida
        </span>
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/auth/register">Crear cuenta</a>
    </p>
  </div>
</div>
