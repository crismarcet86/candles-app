<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Bienvenido al sistema de gestión de velas</p>
    </div>
  </div>

  <div class="quick-actions">
    <button class="action-btn" (click)="goTo('/dashboard/proformas/new')">
      <span class="action-icon">📄</span>
      <span>Nueva proforma</span>
    </button>
    <button class="action-btn" (click)="goTo('/dashboard/products')">
      <span class="action-icon">🧪</span>
      <span>Ingredientes</span>
    </button>
    <button class="action-btn" (click)="goTo('/dashboard/clients')">
      <span class="action-icon">👥</span>
      <span>Clientes</span>
    </button>
    <button class="action-btn" (click)="goTo('/dashboard/calculator')">
      <span class="action-icon">🧮</span>
      <span>Calculadora</span>
    </button>
    <button class="action-btn" (click)="goTo('/dashboard/orders')">
      <span class="action-icon">📦</span>
      <span>Pedidos</span>
    </button>
    <button class="action-btn" (click)="goTo('/dashboard/reports')">
      <span class="action-icon">📈</span>
      <span>Reportes</span>
    </button>
  </div>
</div>
