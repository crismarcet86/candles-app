<header class="topbar">

  <!-- Toggle sidebar -->
  <button class="btn-icon" (click)="toggleSidebar.emit()" title="Menú">
    ☰
  </button>

  <!-- Nombre del negocio -->
  <div class="business-name">
    <span class="bname-text">{{ businessName }}</span>
  </div>

  <div class="topbar-right">
    <!-- Avatar y menú de usuario -->
    <div class="user-menu-wrapper">
      <button class="user-btn" (click)="toggleUserMenu()">
        <span class="avatar">{{ user?.name?.charAt(0)?.toUpperCase() }}</span>
        <span class="user-name">{{ user?.name }}</span>
        <span class="chevron" [class.open]="userMenuOpen">▾</span>
      </button>

      <div class="dropdown" *ngIf="userMenuOpen" (click)="userMenuOpen = false">
        <div class="dropdown-header">
          <strong>{{ user?.name }}</strong>
          <small>{{ user?.username }}</small>
          <span class="role-badge" [class.role-admin]="user?.role === 'admin'">
            {{ user?.role === 'admin' ? 'Administrador' : 'Usuario' }}
          </span>
        </div>
        <hr>
        <button class="dropdown-item" (click)="$event.stopPropagation(); openPwModal()">
          🔑 Cambiar contraseña
        </button>
        <button class="dropdown-item danger" (click)="$event.stopPropagation(); logout()">
          🚪 Cerrar sesión
        </button>
      </div>
    </div>
  </div>

</header>

<!-- Overlay para cerrar el menú -->
<div class="overlay" *ngIf="userMenuOpen" (click)="userMenuOpen = false"></div>

<!-- Modal cambiar contraseña -->
<div class="modal-backdrop" *ngIf="showPwModal" (click)="closePwModal()">
  <div class="pw-modal" (click)="$event.stopPropagation()">
    <div class="pw-modal-header">
      <h3>🔑 Cambiar contraseña</h3>
      <button class="pw-modal-close" (click)="closePwModal()">✕</button>
    </div>

    <div class="alert-success" *ngIf="pwSuccess">{{ pwSuccess }}</div>
    <div class="alert-error"   *ngIf="pwError">{{ pwError }}</div>

    <div class="pw-form-group">
      <label>Contraseña actual</label>
      <input type="password" [(ngModel)]="currentPw" placeholder="••••••••" [disabled]="pwLoading">
    </div>
    <div class="pw-form-group">
      <label>Nueva contraseña</label>
      <input type="password" [(ngModel)]="newPw" placeholder="Mínimo 6 caracteres" [disabled]="pwLoading">
    </div>
    <div class="pw-form-group">
      <label>Confirmar nueva contraseña</label>
      <input type="password" [(ngModel)]="confirmPw" placeholder="Repetir nueva contraseña" [disabled]="pwLoading">
    </div>

    <div class="pw-modal-actions">
      <button class="btn-outline" (click)="closePwModal()" [disabled]="pwLoading">Cancelar</button>
      <button class="btn-primary" (click)="submitChangePassword()" [disabled]="pwLoading">
        <span *ngIf="!pwLoading">Guardar</span>
        <span *ngIf="pwLoading" class="spinner"></span>
      </button>
    </div>
  </div>
</div>
