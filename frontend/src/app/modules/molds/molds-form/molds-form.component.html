<div class="page">
  <div class="page-header">
    <button class="btn-back" (click)="cancel()">← Volver</button>
    <h1 class="page-title">{{ isEdit ? 'Editar molde' : 'Nuevo molde' }}</h1>
  </div>

  <div class="card skeleton-card" *ngIf="loadingData">
    <div class="skeleton-field" *ngFor="let i of [1,2,3]"></div>
  </div>

  <div class="card" *ngIf="!loadingData">
    <div class="alert alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="form-group">
        <label>Nombre del molde <span class="required">*</span></label>
        <input type="text" formControlName="name" placeholder="Ej: Redondo 200g, Vela cilíndrica grande"
               [class.invalid]="field('name')?.invalid && field('name')?.touched">
        <span class="field-error" *ngIf="field('name')?.hasError('required') && field('name')?.touched">Requerido</span>
      </div>

      <div class="form-group">
        <label>Gramos de cera que contiene <span class="required">*</span></label>
        <div class="input-suffix-wrapper">
          <input type="number" formControlName="wax_grams" placeholder="200" min="0.001" step="1"
                 [class.invalid]="field('wax_grams')?.invalid && field('wax_grams')?.touched">
          <span class="input-suffix">g</span>
        </div>
        <span class="field-hint">Cantidad de cera necesaria para llenar este molde completamente</span>
        <span class="field-error" *ngIf="field('wax_grams')?.hasError('required') && field('wax_grams')?.touched">Requerido</span>
        <span class="field-error" *ngIf="field('wax_grams')?.hasError('min') && field('wax_grams')?.touched">Debe ser mayor a 0</span>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea formControlName="description" placeholder="Descripción opcional del molde..."></textarea>
      </div>

      <div class="form-group form-toggle" *ngIf="isEdit">
        <label class="toggle-label">
          <span>Estado</span>
          <div class="toggle-wrapper">
            <input type="checkbox" formControlName="is_active"
                   [checked]="field('is_active')?.value === 1"
                   (change)="form.get('is_active')?.setValue($any($event.target).checked ? 1 : 0)">
            <span class="toggle-track" [class.active]="field('is_active')?.value === 1">
              <span class="toggle-knob"></span>
            </span>
            <span class="toggle-text">{{ field('is_active')?.value === 1 ? 'Activo' : 'Inactivo' }}</span>
          </div>
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-outline" (click)="cancel()" [disabled]="loading">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="!loading">{{ isEdit ? 'Guardar cambios' : 'Crear molde' }}</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </div>
    </form>
  </div>
</div>
