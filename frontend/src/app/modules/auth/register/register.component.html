<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🕯️</div>
    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-subtitle">Registra el acceso al sistema</p>

    <div class="alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="form-group">
        <label for="name">Nombre completo</label>
        <input id="name" type="text" formControlName="name" placeholder="Tu nombre"
               [class.invalid]="field('name')?.invalid && field('name')?.touched">
        <span class="field-error" *ngIf="field('name')?.invalid && field('name')?.touched">
          El nombre es requerido
        </span>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com"
               [class.invalid]="field('email')?.invalid && field('email')?.touched">
        <span class="field-error" *ngIf="field('email')?.hasError('required') && field('email')?.touched">
          El correo es requerido
        </span>
        <span class="field-error" *ngIf="field('email')?.hasError('pattern') && field('email')?.touched">
          Ingresa un correo válido (ej: usuario@dominio.com)
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-icon-wrapper">
          <input id="password"
                 [type]="showPassword ? 'text' : 'password'"
                 formControlName="password" placeholder="Mínimo 6 caracteres"
                 [class.invalid]="field('password')?.invalid && field('password')?.touched">
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error" *ngIf="field('password')?.hasError('minlength') && field('password')?.touched">
          Mínimo 6 caracteres
        </span>
      </div>

      <div class="form-group">
        <label for="confirm">Confirmar contraseña</label>
        <input id="confirm" type="password" formControlName="confirm" placeholder="Repite la contraseña"
               [class.invalid]="(field('confirm')?.touched && form.hasError('mismatch'))">
        <span class="field-error" *ngIf="field('confirm')?.touched && form.hasError('mismatch')">
          Las contraseñas no coinciden
        </span>
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Crear cuenta</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/auth/login">Iniciar sesión</a>
    </p>
  </div>
</div>
