<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen" [class.is-mobile]="isMobile">
  <!-- Backdrop para cerrar sidebar en móvil -->
  <div class="sidebar-backdrop" *ngIf="sidebarOpen && isMobile" (click)="toggleSidebar()"></div>

  <app-sidebar [open]="sidebarOpen" (closeRequest)="sidebarOpen = false"></app-sidebar>

  <div class="main-area">
    <app-topbar (toggleSidebar)="toggleSidebar()"></app-topbar>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
